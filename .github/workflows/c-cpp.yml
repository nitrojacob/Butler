name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install ESP8266 RTOS SDK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget make gcc g++ flex bison gperf python3 python3-pip python3-setuptools
          pip3 install pyserial

      - name: Download ESP8266 RTOS SDK v3.4
        run: |
          git clone --branch v3.4 https://github.com/espressif/ESP8266_RTOS_SDK.git esp8266-rtos-sdk
          cd esp8266-rtos-sdk
          ./install.sh
          pip3 install --user -r ./requirements.txt

      - name: Set environment and build
        run: |
          export ESP8266_RTOS_SDK_PATH=$(pwd)/esp8266-rtos-sdk
          export PATH=$(pwd)/esp8266-rtos-sdk/xtensa-lx106-elf/bin:$PATH
          export IDF_PATH=$(pwd)/esp8266-rtos-sdk
          cd $GITHUB_WORKSPACE
          make all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/*.bin
            build/*.map
