name: Build Project Butler

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: "Building project"
        uses: nsfilho/esp8266-rtos-sdk@v2
        with:
          makearg: "defconfig all"
        shell: bash
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/*.bin
            build/*.map

